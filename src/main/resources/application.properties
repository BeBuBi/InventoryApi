# ============================================================
# Server Inventory System — application.properties
# ============================================================

server.port=8080

# ------------------------------------------------------------
# Datasource — SQLite
# ------------------------------------------------------------
spring.datasource.url=jdbc:sqlite:${DB_PATH:./inventory.db}?journal_mode=WAL&busy_timeout=5000
spring.datasource.driver-class-name=org.sqlite.JDBC

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ------------------------------------------------------------
# Flyway
# ------------------------------------------------------------
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ------------------------------------------------------------
# Encryption
# (Set ENCRYPTION_KEY env variable at runtime via Kubernetes Secret)
# ------------------------------------------------------------
app.encryption.key=${ENCRYPTION_KEY:MyMfrDU82YennXOMrKZMGct4TRhy7W4thXhFfwADoaM=}

# ------------------------------------------------------------
# CORS — allow Angular dev server
# ------------------------------------------------------------
app.cors.allowed-origins=http://localhost:4200

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.root=INFO
logging.level.com.example.inventorysystem=DEBUG
