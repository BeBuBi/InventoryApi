apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventorytool-v2-frontend
  namespace: inventorytracker-api-dev
  labels:
    app: inventorytool-v2
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventorytool-v2
      component: frontend
  template:
    metadata:
      labels:
        app: inventorytool-v2
        component: frontend
    spec:
      containers:
        - name: frontend
          image: repo.corp.cox.com/cox-ccm-docker/inventorytool_v2/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: inventorytool-v2-frontend
  namespace: inventorytracker-api-dev
  labels:
    app: inventorytool-v2
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: inventorytool-v2
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
