openapi: 3.0.3

info:
  title: Server Inventory System API
  description: |
    REST API for the Server Inventory System.

    Manages server asset inventory and provides access to VMware vSphere,
    New Relic, and ServiceNow CMDB sync data.

    **Authentication:** Not yet enforced. Spring Security is currently configured
    with `permitAll()` for all routes. JWT authentication is planned for a future iteration.
  version: 1.1.0

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://inventory.example.com
    description: Production

tags:
  - name: Inventory
    description: Read-only aggregated inventory VIEW — search, filter, and retrieve assets
  - name: vSphere
    description: VMware vSphere VM records and sync control
  - name: New Relic
    description: New Relic agent records and sync control
  - name: Dashboard
    description: Aggregated dashboard data from the inventory VIEW
  - name: Credentials
    description: Encrypted connection credentials for vSphere, New Relic, and CMDB
  - name: CMDB
    description: CMDB configuration item records synced from ServiceNow
  - name: Schedule
    description: Sync schedule configuration per service
  - name: Reports
    description: Cross-source inventory discrepancy reports

# ==============================================================
# PATHS
# ==============================================================
paths:

  # ------------------------------------------------------------
  # Inventory
  # ------------------------------------------------------------
  /api/inventory:
    get:
      tags: [Inventory]
      summary: List assets
      description: |
        Returns a paginated list of assets from the read-only inventory VIEW.
        The VIEW aggregates vsphere, newrelic, and cmdb by hostname.
      operationId: listInventory
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: search
          in: query
          description: Partial hostname match (case-insensitive)
          schema:
            type: string
          example: web-prod
        - name: operationalStatus
          in: query
          description: Filter by CMDB operational status code
          schema:
            type: string
          example: "1"
        - name: sources
          in: query
          description: Filter by source system(s)
          schema:
            type: string
            enum: [vsphere, newrelic, cmdb]
          example: vsphere
      responses:
        '200':
          description: Paginated list of assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponsePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inventory/counts:
    get:
      tags: [Inventory]
      summary: Get inventory counts by source
      description: Returns total asset count and per-source counts (vsphere, newrelic, cmdb).
      operationId: getInventoryCounts
      responses:
        '200':
          description: Asset counts by source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryCountsResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inventory/{hostname}:
    parameters:
      - $ref: '#/components/parameters/HostnameParam'

    get:
      tags: [Inventory]
      summary: Get asset detail
      description: |
        Returns a flat asset detail record from the inventory VIEW for one hostname.
        All vsphere, newrelic, and cmdb fields are included; fields from sources
        that have no record for this hostname will be null.
      operationId: getInventoryByHostname
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ------------------------------------------------------------
  # Dashboard
  # ------------------------------------------------------------
  /api/dashboard/assets:
    get:
      tags: [Dashboard]
      summary: List assets for dashboard
      description: |
        Paginated search over the inventory VIEW for the dashboard view.
        Simpler parameter set than /api/inventory — just search and pagination.
      operationId: listDashboardAssets
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: search
          in: query
          description: Partial hostname match
          schema:
            type: string
      responses:
        '200':
          description: Paginated inventory response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponsePage'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ------------------------------------------------------------
  # vSphere
  # ------------------------------------------------------------
  /api/vsphere:
    get:
      tags: [vSphere]
      summary: List vSphere records
      operationId: listVsphere
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: search
          in: query
          description: Partial hostname match (debounced text filter on Hostname column header).
          schema:
            type: string
        - name: sourceUrls
          in: query
          description: Filter by one or more vCenter source URLs. Use values returned by `GET /api/vsphere/vcenter-urls`. Supports multi-select.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: ["https://vcenter.example.com"]
        - name: powerStates
          in: query
          description: Filter by one or more VM power states. Supports multi-select.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [poweredOn, poweredOff, suspended]
        - name: guestOsTypes
          in: query
          description: Filter by one or more guest OS values. Use values returned by `GET /api/vsphere/guest-os-types`. Supports multi-select.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Paginated list of vSphere records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VsphereRecordPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/vsphere/vcenter-urls:
    get:
      tags: [vSphere]
      summary: List distinct vCenter URLs
      description: Returns a sorted, deduplicated list of all `source_url` values present in the vsphere table. Used to populate the vCenter URL filter dropdown on the vSphere list screen.
      operationId: listVcenterUrls
      responses:
        '200':
          description: Sorted list of distinct vCenter URL strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: "https://vcenter.example.com"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/vsphere/guest-os-types:
    get:
      tags: [vSphere]
      summary: List distinct guest OS types
      description: Returns a sorted, deduplicated list of all `guest_os` values present in the vsphere table. Used to populate the Guest OS multi-select filter on the vSphere list screen.
      operationId: listGuestOsTypes
      responses:
        '200':
          description: Sorted list of distinct guest OS strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["Ubuntu Linux (64-bit)", "Red Hat Enterprise Linux 8 (64-bit)"]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/vsphere/sync:
    post:
      tags: [vSphere]
      summary: Trigger manual vSphere sync
      description: Immediately starts a vSphere sync job, ignoring the configured schedule.
      operationId: triggerVsphereSync
      responses:
        '202':
          description: Sync job accepted and started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncAccepted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: A sync job is already running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/vsphere/sync/status:
    get:
      tags: [vSphere]
      summary: Get vSphere sync status
      description: Returns the status and result of the most recent vSphere sync run.
      operationId: getVsphereSyncStatus
      responses:
        '200':
          description: vSphere sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/vsphere/{hostname}:
    parameters:
      - $ref: '#/components/parameters/HostnameParam'

    get:
      tags: [vSphere]
      summary: Get vSphere record by hostname
      operationId: getVsphereByHostname
      responses:
        '200':
          description: vSphere record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VsphereRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ------------------------------------------------------------
  # New Relic
  # ------------------------------------------------------------
  /api/newrelic:
    get:
      tags: [New Relic]
      summary: List New Relic records
      operationId: listNewRelic
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: search
          in: query
          description: Partial hostname match (debounced text filter on Hostname column header).
          schema:
            type: string
        - name: service
          in: query
          description: Filter by service name custom attribute.
          schema:
            type: string
        - name: environment
          in: query
          description: Filter by environment custom attribute.
          schema:
            type: string
        - name: accountIds
          in: query
          description: Filter by one or more New Relic account IDs. Supports multi-select.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: ["12345", "67890"]
        - name: linuxDistros
          in: query
          description: Filter by one or more Linux distribution values. Use values returned by `GET /api/newrelic/linux-distros`. Supports multi-select.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Paginated list of New Relic records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewRelicRecordPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/newrelic/linux-distros:
    get:
      tags: [New Relic]
      summary: List distinct Linux distributions
      description: Returns a sorted, deduplicated list of all `linux_distribution` values present in the newrelic table. Used to populate the Linux Distro multi-select filter on the New Relic list screen.
      operationId: listLinuxDistros
      responses:
        '200':
          description: Sorted list of distinct Linux distribution strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["Ubuntu 20.04", "Ubuntu 22.04", "Red Hat Enterprise Linux 8"]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/newrelic/environments:
    get:
      tags: [New Relic]
      summary: List distinct environments
      description: Returns distinct environment values from New Relic records for use in multi-select filters.
      operationId: listNewRelicEnvironments
      responses:
        '200':
          description: List of environment strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/newrelic/accounts:
    get:
      tags: [New Relic]
      summary: List distinct account IDs
      description: Returns distinct account_id values from New Relic records for use in multi-select filters.
      operationId: listNewRelicAccounts
      responses:
        '200':
          description: List of account ID strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/newrelic/sync:
    post:
      tags: [New Relic]
      summary: Trigger manual New Relic sync
      description: Immediately starts a New Relic sync job, ignoring the configured schedule.
      operationId: triggerNewRelicSync
      responses:
        '202':
          description: Sync job accepted and started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncAccepted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: A sync job is already running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/newrelic/sync/status:
    get:
      tags: [New Relic]
      summary: Get New Relic sync status
      description: Returns the status and result of the most recent New Relic sync run.
      operationId: getNewRelicSyncStatus
      responses:
        '200':
          description: New Relic sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/newrelic/{hostname}:
    parameters:
      - $ref: '#/components/parameters/HostnameParam'

    get:
      tags: [New Relic]
      summary: Get New Relic record by hostname
      operationId: getNewRelicByHostname
      responses:
        '200':
          description: New Relic record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewRelicRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ------------------------------------------------------------
  # CMDB
  # ------------------------------------------------------------
  /api/cmdb:
    get:
      tags: [CMDB]
      summary: List CMDB records
      operationId: listCmdb
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: search
          in: query
          description: Partial hostname match (debounced text filter on Hostname column header).
          required: false
          schema:
            type: string
          example: web-prod
        - name: osVersions
          in: query
          description: Filter by one or more OS version values. Use values returned by `GET /api/cmdb/os-versions`. Supports multi-select.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: ["8.7", "9.0"]
        - name: opStatuses
          in: query
          description: Filter by one or more operational status values. Use values returned by `GET /api/cmdb/operational-statuses`. Supports multi-select.
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example: [operational, non-operational]
      responses:
        '200':
          description: Paginated list of CMDB records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CmdbRecordPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/cmdb/os-versions:
    get:
      tags: [CMDB]
      summary: List distinct OS versions
      description: Returns a sorted, deduplicated list of all `os_version` values present in the cmdb table. Used to populate the OS Version multi-select filter on the CMDB list screen.
      operationId: listCmdbOsVersions
      responses:
        '200':
          description: Sorted list of distinct OS version strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["7.9", "8.7", "9.0"]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/cmdb/operational-statuses:
    get:
      tags: [CMDB]
      summary: List distinct operational statuses
      description: Returns a sorted, deduplicated list of all `operational_status` values present in the cmdb table. Used to populate the Operational Status multi-select filter on the CMDB list screen.
      operationId: listCmdbOpStatuses
      responses:
        '200':
          description: Sorted list of distinct operational status strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: [operational, non-operational, retired]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/cmdb/sync:
    post:
      tags: [CMDB]
      summary: Trigger manual CMDB sync
      description: Immediately starts a CMDB sync job, ignoring the configured schedule.
      operationId: triggerCmdbSync
      responses:
        '202':
          description: Sync job accepted and started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncAccepted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: A sync job is already running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/cmdb/sync/status:
    get:
      tags: [CMDB]
      summary: Get CMDB sync status
      description: Returns the status and result of the most recent CMDB sync run.
      operationId: getCmdbSyncStatus
      responses:
        '200':
          description: CMDB sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/cmdb/{hostname}:
    parameters:
      - $ref: '#/components/parameters/HostnameParam'

    get:
      tags: [CMDB]
      summary: Get CMDB record by hostname
      operationId: getCmdbByHostname
      responses:
        '200':
          description: CMDB record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CmdbResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ------------------------------------------------------------
  # Credentials
  # ------------------------------------------------------------
  /api/settings/credentials:
    get:
      tags: [Credentials]
      summary: List all credentials
      description: Returns credential metadata for all entries filtered by service. The `config` field is never decrypted or returned on list — no secrets travel over the wire.
      operationId: listCredentials
      parameters:
        - name: service
          in: query
          required: true
          description: Filter credentials by service type
          schema:
            type: string
            enum: [vsphere, newrelic, cmdb]
          example: vsphere
      responses:
        '200':
          description: List of credentials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CredentialRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Credentials]
      summary: Create a credential
      description: Stores a new credential entry. The `config` is encrypted before storage.
      operationId: createCredential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCredentialRequest'
            examples:
              vsphere:
                summary: vSphere credential
                value:
                  service: vsphere
                  name: Name|AccountId
                  config:
                    host: vcenter.corp.example.com
                    username: admin@vsphere.local
                    password: secret
              newrelic:
                summary: New Relic credential
                value:
                  service: newrelic
                  name: Production Account
                  config:
                    apiKey: NRAK-xxxxxxxxxxxx
                    accountId: "12345"
              cmdb:
                summary: ServiceNow CMDB credential
                value:
                  service: cmdb
                  name: Production ServiceNow
                  config:
                    token_url: https://your-instance.service-now.com/oauth_token.do
                    api_url: https://your-instance.service-now.com/api/xci/cmdb_asset/getAssetDetails
                    client_id: your-client-id
                    client_secret: your-client-secret
                    username: sync-user
                    password: secret
      responses:
        '201':
          description: Credential created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/settings/credentials/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'

    get:
      tags: [Credentials]
      summary: Get credential by ID
      description: Returns a single credential. Passwords and API keys are masked.
      operationId: getCredentialById
      responses:
        '200':
          description: Credential record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [Credentials]
      summary: Update a credential
      operationId: updateCredential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCredentialRequest'
      responses:
        '200':
          description: Credential updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Credentials]
      summary: Delete a credential
      operationId: deleteCredential
      responses:
        '204':
          description: Credential deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/settings/credentials/{id}/enable:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    patch:
      tags: [Credentials]
      summary: Enable a credential
      operationId: enableCredential
      responses:
        '200':
          description: Credential enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/settings/credentials/{id}/disable:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    patch:
      tags: [Credentials]
      summary: Disable a credential
      operationId: disableCredential
      responses:
        '200':
          description: Credential disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ------------------------------------------------------------
  # Sync Schedule
  # ------------------------------------------------------------
  /api/settings/schedule:
    get:
      tags: [Schedule]
      summary: List all sync schedules
      operationId: listSchedules
      responses:
        '200':
          description: List of sync schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SyncScheduleRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/settings/schedule/{service}:
    parameters:
      - $ref: '#/components/parameters/ServiceParam'

    get:
      tags: [Schedule]
      summary: Get schedule for a service
      operationId: getScheduleByService
      responses:
        '200':
          description: Sync schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncScheduleRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [Schedule]
      summary: Save or update schedule for a service
      operationId: updateSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScheduleRequest'
            example:
              cronExpr: "0 0 2 * * *"
              enabled: true
              description: Every day at 2:00 AM
      responses:
        '200':
          description: Schedule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncScheduleRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/settings/schedule/{service}/enable:
    parameters:
      - $ref: '#/components/parameters/ServiceParam'
    patch:
      tags: [Schedule]
      summary: Enable a sync schedule
      operationId: enableSchedule
      responses:
        '200':
          description: Schedule enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncScheduleRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/settings/schedule/{service}/disable:
    parameters:
      - $ref: '#/components/parameters/ServiceParam'
    patch:
      tags: [Schedule]
      summary: Pause a sync schedule
      operationId: disableSchedule
      responses:
        '200':
          description: Schedule paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncScheduleRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ------------------------------------------------------------
  # Reports
  # ------------------------------------------------------------
  /api/reports/missing-from-cmdb:
    get:
      tags: [Reports]
      summary: Hosts missing from CMDB
      description: Returns hosts found in vSphere or New Relic that have no matching CMDB record.
      operationId: missingFromCmdb
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Filter by hostname (case-insensitive substring)
        - name: powerState
          in: query
          required: false
          schema:
            type: string
            enum: [poweredOn, poweredOff, suspended]
          description: Filter by power state
        - name: sources
          in: query
          required: false
          schema:
            type: string
            enum: [vsphere, newrelic]
          description: Filter by source system
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Paged list of inventory records missing from CMDB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedInventoryResponse'

  /api/reports/missing-from-cmdb/count:
    get:
      tags: [Reports]
      summary: Count of hosts missing from CMDB
      operationId: missingFromCmdbCount
      responses:
        '200':
          description: Count of hosts missing from CMDB
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    format: int64

  /api/reports/ip-discrepancy:
    get:
      tags: [Reports]
      summary: IP address discrepancies
      description: |
        For each host in CMDB that has vSphere or New Relic IP data, iterates each source IPv4
        address and reports hosts where at least one source IP is absent from the CMDB IP list.
        IPv6 addresses are excluded. Hosts where all source IPs are already in CMDB are not reported.
      operationId: ipDiscrepancy
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Filter by hostname (case-insensitive substring)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Paged list of IP discrepancy entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedIpDiscrepancyResponse'


# ==============================================================
# COMPONENTS
# ==============================================================
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ------------------------------------------------------------
  # Parameters
  # ------------------------------------------------------------
  parameters:
    PageParam:
      name: page
      in: query
      description: Zero-based page number
      schema:
        type: integer
        default: 0
        minimum: 0
      example: 0

    SizeParam:
      name: size
      in: query
      description: Number of items per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      example: 20

    HostnameParam:
      name: hostname
      in: path
      required: true
      description: Asset hostname (primary key)
      schema:
        type: string
      example: web-prod-01

    IdParam:
      name: id
      in: path
      required: true
      description: Credential ID
      schema:
        type: integer
        minimum: 1
      example: 1

    ServiceParam:
      name: service
      in: path
      required: true
      description: Service name
      schema:
        type: string
        enum: [vsphere, newrelic, cmdb]
      example: vsphere

  # ------------------------------------------------------------
  # Schemas
  # ------------------------------------------------------------
  schemas:

    # -- Inventory (flat VIEW response) --
    InventoryResponse:
      type: object
      description: |
        Flat aggregated record from the inventory VIEW. Fields from sources that
        have no record for this hostname will be null.
      properties:
        hostname:
          type: string
          example: web-prod-01
        # vSphere fields
        vsphereIpv4:
          type: string
          nullable: true
          example: 10.0.1.50
        vsphereIpv6:
          type: string
          nullable: true
          example: null
        vmName:
          type: string
          nullable: true
          example: web-prod-01
        cpuCount:
          type: integer
          nullable: true
          example: 4
        cpuCores:
          type: integer
          nullable: true
          example: 2
        memoryMb:
          type: integer
          nullable: true
          example: 8192
        memoryGb:
          type: integer
          nullable: true
          example: 8
        powerState:
          type: string
          enum: [poweredOn, poweredOff, suspended]
          nullable: true
          example: poweredOn
        guestOs:
          type: string
          nullable: true
          example: "Ubuntu Linux (64-bit)"
        toolsStatus:
          type: string
          enum: [toolsOk, toolsOld, toolsNotRunning, toolsNotInstalled]
          nullable: true
          example: toolsOk
        vsphereLastSynced:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-01T02:05:00Z"
        # New Relic fields
        fullHostname:
          type: string
          nullable: true
          example: web-prod-01.corp.example.com
        nrIpv4:
          type: string
          nullable: true
          example: 10.0.1.50
        nrIpv6:
          type: string
          nullable: true
          example: null
        processorCount:
          type: integer
          nullable: true
          example: 4
        coreCount:
          type: integer
          nullable: true
          example: 2
        systemMemoryBytes:
          type: integer
          nullable: true
          example: 8589934592
        linuxDistribution:
          type: string
          nullable: true
          example: "Ubuntu 22.04"
        service:
          type: string
          nullable: true
          example: billing-service
        nrEnvironment:
          type: string
          nullable: true
          example: production
        team:
          type: string
          nullable: true
          example: platform
        nrLocation:
          type: string
          nullable: true
          example: dc1
        accountId:
          type: string
          nullable: true
          example: "12345"
        # CMDB fields
        sysId:
          type: string
          nullable: true
          example: abc123def456
        os:
          type: string
          nullable: true
          example: "Red Hat Enterprise Linux"
        osVersion:
          type: string
          nullable: true
          example: "8.7"
        cmdbIpAddress:
          type: string
          nullable: true
          example: 10.0.1.50
        cmdbLocation:
          type: string
          nullable: true
          example: dc1-rack-12
        department:
          type: string
          nullable: true
          example: platform-engineering
        cmdbEnvironment:
          type: string
          nullable: true
          example: production
        operationalStatus:
          type: string
          nullable: true
          example: "1"
        classification:
          type: string
          nullable: true
          example: server
        cmdbLastSynced:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-07T03:00:00Z"
        # Computed
        sources:
          type: string
          nullable: true
          description: Comma-separated list of sources that have a record for this hostname
          example: "vsphere,newrelic,cmdb"

    InventoryCountsResponse:
      type: object
      properties:
        total:
          type: integer
          example: 350
        vsphere:
          type: integer
          example: 280
        newrelic:
          type: integer
          example: 310
        cmdb:
          type: integer
          example: 240

    # -- vSphere --
    VsphereRecord:
      type: object
      properties:
        hostname:
          type: string
          example: web-prod-01
        vmName:
          type: string
          example: web-prod-01
        cpuCount:
          type: integer
          nullable: true
          example: 4
        cpuCores:
          type: integer
          nullable: true
          example: 2
        memoryMb:
          type: integer
          nullable: true
          example: 8192
        memoryGb:
          type: integer
          nullable: true
          example: 8
        powerState:
          type: string
          enum: [poweredOn, poweredOff, suspended]
          nullable: true
          example: poweredOn
        guestOs:
          type: string
          nullable: true
          example: "Ubuntu Linux (64-bit)"
        toolsStatus:
          type: string
          enum: [toolsOk, toolsOld, toolsNotRunning, toolsNotInstalled]
          nullable: true
          example: toolsOk
        ipv4Address:
          type: string
          nullable: true
          example: 10.0.1.50
        ipv6Address:
          type: string
          nullable: true
          example: null
        sourceUrl:
          type: string
          nullable: true
          description: vCenter hostname this record was synced from
          example: vcenter.corp.example.com
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-01T02:05:00Z"
        createdAt:
          type: string
          format: date-time
          example: "2026-02-01T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-01T02:05:00Z"

    # -- New Relic --
    NewRelicRecord:
      type: object
      properties:
        hostname:
          type: string
          example: web-prod-01
        fullHostname:
          type: string
          nullable: true
          example: web-prod-01.corp.example.com
        ipv4Address:
          type: string
          nullable: true
          example: 10.0.1.50
        ipv6Address:
          type: string
          nullable: true
          example: null
        processorCount:
          type: integer
          nullable: true
          example: 4
        coreCount:
          type: integer
          nullable: true
          example: 2
        systemMemoryBytes:
          type: integer
          nullable: true
          example: 8589934592
        linuxDistribution:
          type: string
          nullable: true
          example: "Ubuntu 22.04"
        service:
          type: string
          nullable: true
          example: billing-service
        environment:
          type: string
          nullable: true
          example: production
        team:
          type: string
          nullable: true
          example: platform
        location:
          type: string
          nullable: true
          example: dc1
        accountId:
          type: string
          nullable: true
          example: "12345"
        createdAt:
          type: string
          format: date-time
          example: "2026-02-01T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-02T06:10:00Z"

    # -- Paginated responses --
    InventoryResponsePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/InventoryResponse'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 142
        totalPages:
          type: integer
          example: 8

    VsphereRecordPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/VsphereRecord'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 95
        totalPages:
          type: integer
          example: 5

    NewRelicRecordPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/NewRelicRecord'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 88
        totalPages:
          type: integer
          example: 5

    # -- CMDB --
    CmdbResponse:
      type: object
      properties:
        hostname:
          type: string
          example: web-prod-01
        sysId:
          type: string
          nullable: true
          example: abc123def456
        os:
          type: string
          nullable: true
          example: "Red Hat Enterprise Linux"
        osVersion:
          type: string
          nullable: true
          example: "8.7"
        ipAddress:
          type: string
          nullable: true
          example: 10.0.1.50
        location:
          type: string
          nullable: true
          example: dc1-rack-12
        department:
          type: string
          nullable: true
          example: platform-engineering
        environment:
          type: string
          nullable: true
          example: production
        operationalStatus:
          type: string
          nullable: true
          example: operational
        classification:
          type: string
          nullable: true
          example: server
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-07T04:00:00Z"
        createdAt:
          type: string
          format: date-time
          example: "2026-02-01T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-07T04:00:00Z"

    CmdbRecordPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CmdbResponse'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 210
        totalPages:
          type: integer
          example: 11

    # -- Credentials --
    CredentialRecord:
      type: object
      properties:
        id:
          type: integer
          example: 1
        service:
          type: string
          enum: [vsphere, newrelic, cmdb]
          example: vsphere
        name:
          type: string
          example: Name|AccountId
        config:
          description: Sensitive fields are masked — passwords and API keys are never returned in plain text.
          oneOf:
            - $ref: '#/components/schemas/VsphereConfigMasked'
            - $ref: '#/components/schemas/NewRelicConfigMasked'
            - $ref: '#/components/schemas/CmdbConfigMasked'
        enabled:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2026-02-01T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-02-01T10:00:00Z"

    VsphereConfigMasked:
      type: object
      properties:
        host:
          type: string
          example: vcenter.corp.example.com
        username:
          type: string
          example: admin@vsphere.local
        password:
          type: string
          description: Always masked in responses
          example: "********"

    NewRelicConfigMasked:
      type: object
      properties:
        apiKey:
          type: string
          description: Always masked in responses
          example: "NRAK-****"
        accountId:
          type: string
          example: "12345"

    CmdbConfigMasked:
      type: object
      properties:
        token_url:
          type: string
          example: "https://your-instance.service-now.com/oauth_token.do"
        api_url:
          type: string
          example: "https://your-instance.service-now.com/api/xci/cmdb_asset/getAssetDetails"
        client_id:
          type: string
          example: "your-client-id"
        client_secret:
          type: string
          description: Always masked in responses
          example: "********"
        username:
          type: string
          example: "sync-user"
        password:
          type: string
          description: Always masked in responses
          example: "********"

    CreateCredentialRequest:
      type: object
      required: [service, name, config]
      properties:
        service:
          type: string
          enum: [vsphere, newrelic, cmdb]
          example: vsphere
        name:
          type: string
          example: Name|AccountId
        config:
          type: string
          description: |
            JSON string of the credential config, serialized by the client before sending.
            Encrypted with AES-256-GCM before storage. When parsed, the structure is
            service-specific (see VsphereConfig, NewRelicConfig, CmdbConfig schemas).
          example: '{"host":"vcenter.corp.example.com","username":"admin@vsphere.local","password":"secret"}'

    UpdateCredentialRequest:
      type: object
      required: [service, name, config]
      properties:
        service:
          type: string
          enum: [vsphere, newrelic, cmdb]
          example: vsphere
        name:
          type: string
          example: Name|AccountId
        config:
          type: string
          description: |
            JSON string of the credential config, serialized by the client before sending.
            Encrypted with AES-256-GCM before storage. When parsed, the structure is
            service-specific (see VsphereConfig, NewRelicConfig, CmdbConfig schemas).
          example: '{"host":"vcenter.corp.example.com","username":"admin@vsphere.local","password":"secret"}'

    VsphereConfig:
      type: object
      required: [host, username, password]
      properties:
        host:
          type: string
          example: vcenter.corp.example.com
        username:
          type: string
          example: admin@vsphere.local
        password:
          type: string
          example: secret

    NewRelicConfig:
      type: object
      required: [apiKey, accountId]
      properties:
        apiKey:
          type: string
          example: NRAK-xxxxxxxxxxxx
        accountId:
          type: string
          example: "12345"

    CmdbConfig:
      type: object
      required: [token_url, api_url, client_id, client_secret, username, password]
      properties:
        token_url:
          type: string
          example: "https://your-instance.service-now.com/oauth_token.do"
        api_url:
          type: string
          example: "https://your-instance.service-now.com/api/xci/cmdb_asset/getAssetDetails"
        client_id:
          type: string
          example: "your-client-id"
        client_secret:
          type: string
          example: "your-client-secret"
        username:
          type: string
          example: "sync-user"
        password:
          type: string
          example: "secret"

    # -- Sync Schedule --
    SyncScheduleRecord:
      type: object
      properties:
        id:
          type: integer
          example: 1
        service:
          type: string
          enum: [vsphere, newrelic, cmdb]
          example: vsphere
        cronExpr:
          type: string
          description: "6-field cron: seconds minutes hours day-of-month month day-of-week"
          example: "0 0 2 * * *"
        enabled:
          type: boolean
          example: true
        description:
          type: string
          nullable: true
          example: Every day at 2:00 AM
        lastRunAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-02T02:00:05Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-02-01T10:00:00Z"

    UpdateScheduleRequest:
      type: object
      required: [cronExpr]
      properties:
        cronExpr:
          type: string
          description: "6-field cron: seconds minutes hours day-of-month month day-of-week"
          example: "0 0 2 * * *"
        enabled:
          type: boolean
          example: true
        description:
          type: string
          example: Every day at 2:00 AM

    # -- Sync status --
    SyncStatus:
      type: object
      properties:
        service:
          type: string
          enum: [vsphere, newrelic, cmdb]
          example: vsphere
        status:
          type: string
          enum: [idle, running, success, failed]
          example: success
        lastRunAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-02T02:05:00Z"
        lastError:
          type: string
          nullable: true
          description: Error detail when status is `failed`
          example: null

    SyncAccepted:
      description: Returned immediately when a sync is triggered (HTTP 202). The sync runs asynchronously; poll GET /sync/status for updates.
      allOf:
        - $ref: '#/components/schemas/SyncStatus'

    # -- Error --
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 404
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: "Asset 'web-prod-01' not found"
        timestamp:
          type: string
          format: date-time
          example: "2026-03-02T10:00:00Z"

    PagedInventoryResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/InventoryResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    PagedIpDiscrepancyResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/IpDiscrepancyEntry'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    IpDiscrepancyEntry:
      type: object
      properties:
        hostname:
          type: string
        vsphereIps:
          type: array
          items:
            type: string
          description: Sorted IPv4 addresses from vSphere
        nrIps:
          type: array
          items:
            type: string
          description: Sorted IPv4 addresses from New Relic
        cmdbIps:
          type: array
          items:
            type: string
          description: Sorted IPv4 addresses from CMDB
        notInCmdb:
          type: array
          items:
            type: string
          description: Source IPs not found in CMDB IP list
        sources:
          type: string
          description: Comma-separated source systems (vsphere, newrelic, cmdb)
        discrepancyType:
          type: string
          enum: [IP mismatch, CMDB has no IP]
        powerState:
          type: string
        guestOs:
          type: string

  # ------------------------------------------------------------
  # Reusable responses
  # ------------------------------------------------------------
  responses:
    BadRequest:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Resource already exists (duplicate hostname or credential name)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
