# ============================================================
# Server Inventory System — application.properties
# ============================================================

server.port=8080

# ------------------------------------------------------------
# Datasource — SQLite
# ------------------------------------------------------------
spring.datasource.url=jdbc:sqlite:${DB_PATH:./data/inventory.db}?journal_mode=WAL&busy_timeout=5000
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000
# Performance tuning for SQLite on network-backed PVCs (K8s).
# synchronous=NORMAL is safe with WAL and avoids expensive fsync on every write.
# cache_size=-65536 = 64 MB page cache in memory.
# temp_store=MEMORY keeps temp tables off disk.
# mmap_size=268435456 = 256 MB memory-mapped reads.
spring.datasource.hikari.connection-init-sql=PRAGMA synchronous=NORMAL; PRAGMA cache_size=-65536; PRAGMA temp_store=MEMORY; PRAGMA mmap_size=268435456;

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ------------------------------------------------------------
# Flyway
# ------------------------------------------------------------
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ------------------------------------------------------------
# CORS — allow Angular dev server
# ------------------------------------------------------------
app.cors.allowed-origins=http://localhost:4200

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.root=INFO
logging.level.com.cox.inventorysystem=DEBUG
